name-template: 'v$NEXT_MAJOR_VERSION.0.0'
tag-template: 'v$NEXT_MAJOR_VERSION.0.0'
categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'fix'
      - 'bugfix'
      - 'bug'
  - title: '🔧 Maintenance'
    labels:
      - 'chore'
      - 'maintenance'
  - title: '📝 Documentation'
    labels:
      - 'docs'
      - 'documentation'
  - title: '✨ Other Changes'
    label: ''

change-template: '- $TITLE (#$NUMBER)'
change-title-escapes: '\<>'
no-changes-template: '- No changes'
template: |
  # What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPO/compare/$PREVIOUS_TAG...v$NEXT_MAJOR_VERSION.0.0

exclude-labels:
  - 'skip-changelog'
  - 'no-changelog'
